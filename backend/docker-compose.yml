version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bourbonhub_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: bourbonhub_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bourbonhub_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
